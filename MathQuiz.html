const CAT_COLORS = {
  "Gesetz der großen Zahlen":"#4CAF50","Wahrscheinlichkeit":"#2196F3",
  "Gegenereignis":"#FF9800","Relative Häufigkeit":"#8BC34A",
  "Absolute Häufigkeit":"#00BCD4","Dezimal ↔ Prozent":"#9C27B0","Vergleich":"#FF5722",
};
const LETTERS = ["A","B","C","D"];

function shuffle(arr){
  const a=[...arr];
  for(let i=a.length-1;i>0;i--){const j=Math.floor(Math.random()*(i+1));[a[i],a[j]]=[a[j],a[i]];}
  return a;
}

function TimerRing({seconds,total,size=52}){
  const r=18,circ=2*Math.PI*r;
  const col=seconds<=10?"#e53e3e":seconds<=20?"#FF9800":"#4CAF50";
  return(
    <div style={{display:"flex",alignItems:"center",gap:5}}>
      <svg width={size} height={size} style={{transform:"rotate(-90deg)"}}>
        <circle cx={size/2} cy={size/2} r={r} fill="none" stroke="rgba(255,255,255,0.1)" strokeWidth="4"/>
        <circle cx={size/2} cy={size/2} r={r} fill="none" stroke={col} strokeWidth="4"
          strokeDasharray={circ} strokeDashoffset={circ*(1-seconds/Math.max(1,total))}
          style={{transition:"stroke-dashoffset 1s linear,stroke 0.3s"}}/>
      </svg>
      <span style={{color:col,fontWeight:900,fontSize:14}}>{seconds}s</span>
    </div>
  );
}

// ── DuelColumn ──────────────────────────────────────────────────
function DuelColumn({name,color,emoji,question,chosen,onPick,score,qNum,total}){
  if(!question)return null;
  const col=CAT_COLORS[question.category]||"#888";
  const ok=chosen!==null&&chosen===question.correct;
  return(
    <div style={{flex:1,display:"flex",flexDirection:"column",background:color+"0d",borderTop:`6px solid ${color}`,padding:"20px 18px",overflow:"auto"}}>
      <div style={{display:"flex",justifyContent:"space-between",alignItems:"center",marginBottom:14}}>
        <span style={{color,fontWeight:900,fontSize:20,whiteSpace:"nowrap"}}>{emoji} {name}</span>
        <span style={{background:color+"33",border:`1px solid ${color}66`,color,borderRadius:20,padding:"5px 14px",fontSize:18,fontWeight:800}}>⭐{score}</span>
      </div>
      <div style={{fontSize:14,color:"#8fa8c8",marginBottom:10,textAlign:"center",fontWeight:600}}>Frage {qNum} / {total}</div>
      <span style={{background:col+"33",border:`1px solid ${col}55`,color:col,borderRadius:20,padding:"4px 14px",fontSize:13,fontWeight:700,display:"inline-block",marginBottom:14,alignSelf:"flex-start"}}>{question.category}</span>
      <p style={{color:"#fff",fontSize:18,fontWeight:700,lineHeight:1.5,marginBottom:18,flex:"0 0 auto"}}>{question.question}</p>
      <div style={{display:"flex",flexDirection:"column",gap:10,flex:1}}>
        {question.options.map((opt,i)=>{
          let bg="rgba(255,255,255,0.06)",brd="1px solid rgba(255,255,255,0.12)",tc="#ccd9ec",fw=400;
          if(chosen!==null){if(i===question.correct){bg="#4CAF5022";brd="1px solid #4CAF50";tc="#7dce83";fw=700;}else if(i===chosen){bg="#e53e3e22";brd="1px solid #e53e3e";tc="#ff8080";}}
          return(<button key={i} onClick={()=>onPick(i)} disabled={chosen!==null} style={{background:bg,border:brd,color:tc,fontWeight:fw,borderRadius:12,padding:"14px 16px",fontSize:16,textAlign:"left",cursor:chosen!==null?"default":"pointer",width:"100%",fontFamily:"inherit",transition:"all 0.15s",lineHeight:1.4}}>
            <span style={{opacity:0.45,marginRight:8,fontWeight:700}}>{LETTERS[i]}.</span>{opt}
          </button>);
        })}
      </div>
      {chosen!==null&&(<div style={{background:ok?"#4CAF5015":"#e53e3e15",border:`1px solid ${ok?"#4CAF5044":"#e53e3e44"}`,borderRadius:12,padding:"14px 16px",marginTop:14,flexShrink:0}}>
        <div style={{color:ok?"#7dce83":"#ff8080",fontWeight:800,fontSize:16,marginBottom:6}}>{ok?"✅ Richtig! +1":"❌ Falsch! −1"}</div>
        <p style={{color:"#adc4e0",fontSize:14,lineHeight:1.5,margin:0}}>{question.explanation}</p>
      </div>)}
    </div>
  );
}

// LEARN MODE COMPONENTS
// ═══════════════════════════════════════════════════════════════
function LearnPractice({ topic, onBack, onTest }) {
  const [phase, setPhase] = useState("info");   // info | practice | done
  const [qIdx, setQIdx]   = useState(0);
  const [chosen, setChosen] = useState(null);
  const [correct, setCorrect] = useState(0);
  const [total, setTotal]   = useState(0);
  const [qs, setQs] = useState([]);

  function startPractice() {
    setQs(shuffle(topic.questions));
    setQIdx(0); setChosen(null); setCorrect(0); setTotal(0);
    setPhase("practice");
  }

  function pick(i) {
    if (chosen !== null) return;
    setChosen(i);
    setTotal(t => t + 1);
    if (i === qs[qIdx].c) setCorrect(c => c + 1);
  }

  function next() {
    if (qIdx + 1 >= qs.length || qIdx + 1 >= 10) { setPhase("done"); return; }
    setQIdx(i => i + 1);
    setChosen(null);
  }

  function stopAndFinish() { setPhase("done"); }

  const col = topic.color;
  const q   = qs[qIdx];

  // ── INFO PAGE ──
  if (phase === "info") return (
    <div style={{padding:"0 4px"}}>
      <button onClick={onBack} style={{background:"none",border:"none",color:"#8fa8c8",fontSize:13,cursor:"pointer",marginBottom:16,fontFamily:"inherit",padding:0}}>← Zurück</button>
      <div style={{textAlign:"center",fontSize:52,marginBottom:6}}>{topic.emoji}</div>
      <h2 style={{color:col,fontSize:22,fontWeight:900,textAlign:"center",marginBottom:12}}>{topic.title}</h2>

      {/* Short definition */}
      <div style={{background:col+"18",border:`1px solid ${col}44`,borderRadius:16,padding:"14px 18px",marginBottom:14}}>
        <div style={{color:col,fontWeight:800,fontSize:13,marginBottom:6}}>📌 Definition</div>
        <p style={{color:"#e8f0fc",fontSize:14,lineHeight:1.6,margin:0}}>{topic.short}</p>
      </div>

      {/* Explanation steps */}
      <div style={{background:"rgba(255,255,255,0.05)",border:"1px solid rgba(255,255,255,0.1)",borderRadius:16,padding:"14px 18px",marginBottom:14}}>
        <div style={{color:"#fff",fontWeight:800,fontSize:13,marginBottom:10}}>📖 Erklärung</div>
        {topic.explanation.map((e,i)=>(
          <div key={i} style={{display:"flex",gap:10,marginBottom:8,alignItems:"flex-start"}}>
            <span style={{color:col,fontWeight:900,fontSize:13,flexShrink:0}}>{i+1}.</span>
            <span style={{color:"#ccd9ec",fontSize:13,lineHeight:1.55}}>{e}</span>
          </div>
        ))}
      </div>

      {/* Example */}
      <div style={{background:"#f0c04015",border:"1px solid #f0c04044",borderRadius:16,padding:"14px 18px",marginBottom:20}}>
        <div style={{color:"#f0c040",fontWeight:800,fontSize:13,marginBottom:8}}>{topic.example.title}</div>
        <pre style={{color:"#e8f0fc",fontSize:13,lineHeight:1.6,margin:0,whiteSpace:"pre-wrap",fontFamily:"'Trebuchet MS',sans-serif"}}>{topic.example.text}</pre>
      </div>

      <button onClick={startPractice} style={{background:`linear-gradient(135deg,${col},${col}bb)`,color:"#fff",border:"none",borderRadius:14,padding:"14px 0",fontSize:16,fontWeight:800,cursor:"pointer",width:"100%",marginBottom:10}}>
        ✏️ Jetzt üben!
      </button>
      <button onClick={onBack} style={{background:"rgba(255,255,255,0.07)",color:"#8fa8c8",border:"1px solid rgba(255,255,255,0.13)",borderRadius:14,padding:"12px 0",fontSize:14,fontWeight:600,cursor:"pointer",width:"100%",fontFamily:"inherit"}}>
        ← Zurück zur Auswahl
      </button>
    </div>
  );

  // ── PRACTICE ──
  if (phase === "practice" && q) {
    const isOk = chosen === q.c;
    const isLast = qIdx + 1 >= Math.min(topic.questions.length, 10);
    return (
      <div style={{padding:"0 4px"}}>
        {/* Header */}
        <div style={{display:"flex",justifyContent:"space-between",alignItems:"center",marginBottom:14}}>
          <span style={{color:col,fontWeight:800,fontSize:14}}>{topic.emoji} {topic.title}</span>
          <span style={{background:col+"33",border:`1px solid ${col}55`,color:col,borderRadius:20,padding:"4px 12px",fontSize:13,fontWeight:800}}>
            {qIdx+1} / {Math.min(topic.questions.length,10)}
          </span>
        </div>
        {/* Progress */}
        <div style={{background:"rgba(255,255,255,0.1)",borderRadius:8,height:6,marginBottom:18,overflow:"hidden"}}>
          <div style={{width:`${((qIdx)/Math.min(topic.questions.length,10))*100}%`,height:"100%",background:`linear-gradient(90deg,${col},${col}bb)`,borderRadius:8,transition:"width 0.4s"}}/>
        </div>

        <div style={{background:"rgba(255,255,255,0.06)",border:`1px solid ${col}33`,borderRadius:20,padding:22}}>
          <p style={{color:"#fff",fontSize:16,fontWeight:700,lineHeight:1.55,marginBottom:18}}>{q.q}</p>
          {q.opts.map((opt,i)=>{
            let bg="rgba(255,255,255,0.06)",brd="1px solid rgba(255,255,255,0.12)",tc="#ccd9ec",fw=400;
            if(chosen!==null){if(i===q.c){bg="#4CAF5020";brd="1px solid #4CAF50";tc="#7dce83";fw=700;}else if(i===chosen){bg="#e53e3e20";brd="1px solid #e53e3e";tc="#ff8080";}}
            return(<button key={i} onClick={()=>pick(i)} disabled={chosen!==null}
              style={{background:bg,border:brd,color:tc,fontWeight:fw,borderRadius:11,padding:"11px 14px",fontSize:13,textAlign:"left",cursor:chosen!==null?"default":"pointer",width:"100%",marginBottom:7,fontFamily:"inherit",transition:"all 0.15s"}}>
              <span style={{opacity:0.45,marginRight:7,fontWeight:700}}>{LETTERS[i]}.</span>{opt}
            </button>);
          })}

          {chosen !== null && (
            <div style={{background:isOk?"#4CAF5015":"#e53e3e15",border:`1px solid ${isOk?"#4CAF5044":"#e53e3e44"}`,borderRadius:12,padding:"12px 15px",marginTop:8}}>
              <div style={{color:isOk?"#7dce83":"#ff8080",fontWeight:800,fontSize:14,marginBottom:4}}>
                {isOk?"✅ Richtig!":"❌ Falsch!"}
              </div>
              <p style={{color:"#adc4e0",fontSize:12,lineHeight:1.6,margin:0}}>{q.exp}</p>
            </div>
          )}

          {chosen !== null && (
            <div style={{display:"flex",gap:10,marginTop:14}}>
              {isLast ? (
                <button onClick={stopAndFinish} style={{background:`linear-gradient(135deg,${col},${col}bb)`,color:"#fff",border:"none",borderRadius:11,padding:"13px 0",fontSize:15,fontWeight:800,cursor:"pointer",flex:1}}>
                  Auswertung ansehen 📊
                </button>
              ) : (
                <>
                  <button onClick={next} style={{background:`linear-gradient(135deg,${col},${col}bb)`,color:"#fff",border:"none",borderRadius:11,padding:"12px 0",fontSize:14,fontWeight:800,cursor:"pointer",flex:2}}>
                    Weiter →
                  </button>
                  <button onClick={stopAndFinish} style={{background:"rgba(255,255,255,0.08)",color:"#8fa8c8",border:"1px solid rgba(255,255,255,0.15)",borderRadius:11,padding:"12px 0",fontSize:13,fontWeight:600,cursor:"pointer",flex:1,fontFamily:"inherit"}}>
                    Ich hab's! →
                  </button>
                </>
              )}
            </div>
          )}
        </div>
      </div>
    );
  }

  // ── DONE ──
  if (phase === "done") {
    const pct = total > 0 ? Math.round((correct/total)*100) : 0;
    const great = pct >= 80;
    return (
      <div style={{padding:"0 4px",textAlign:"center"}}>
        <div style={{fontSize:52,marginBottom:8}}>{great?"🌟":"📚"}</div>
        <h2 style={{color:"#fff",fontSize:22,fontWeight:900,marginBottom:6}}>
          {great?"Super! Du hast es drauf!":"Noch etwas üben!"}
        </h2>
        <p style={{color:"#8fa8c8",fontSize:14,marginBottom:20}}>
          {correct} von {total} Fragen richtig — {pct} %
        </p>
        <div style={{display:"flex",flexDirection:"column",gap:10}}>
          <button onClick={startPractice} style={{background:`linear-gradient(135deg,${col},${col}bb)`,color:"#fff",border:"none",borderRadius:14,padding:"14px 0",fontSize:15,fontWeight:800,cursor:"pointer"}}>
            🔄 Nochmal üben
          </button>
          <button onClick={onTest} style={{background:"linear-gradient(135deg,#f0c040,#e8a020)",color:"#1a0f00",border:"none",borderRadius:14,padding:"14px 0",fontSize:15,fontWeight:800,cursor:"pointer"}}>
            📝 Großen Test machen
          </button>
          <button onClick={onBack} style={{background:"rgba(255,255,255,0.07)",color:"#8fa8c8",border:"1px solid rgba(255,255,255,0.13)",borderRadius:14,padding:"12px 0",fontSize:14,fontWeight:600,cursor:"pointer",fontFamily:"inherit"}}>
            ← Zurück zur Auswahl
          </button>
        </div>
      </div>
    );
  }

  return null;
}

// MAIN APP
// ═══════════════════════════════════════════════════════════════
function App(){
  // screens: start | learn_menu | learn_topic | quiz | result | duel_setup | duel | duel_result
  const [screen,setScreen]=useState("start");
  const [mode,setMode]=useState("count");
  const [countSetting,setCount]=useState(10);
  const [timeSetting,setTime]=useState(60);

  // learn
  const [learnTopic,setLearnTopic]=useState(null);

  // solo
  const [soloQs,setSoloQs]=useState([]);
  const [soloIdx,setSoloIdx]=useState(0);
  const [soloChosen,setSoloChosen]=useState(null);
  const [soloScore,setSoloScore]=useState(0);
  const [soloRights,setSoloRights]=useState(0);
  const [soloWrongs,setSoloWrongs]=useState(0);
  const [soloWrongCats,setSoloWrongCats]=useState([]);
  const [timeLeft,setTimeLeft]=useState(60);
  const [totalTime,setTotalTime]=useState(60);
  const soloTimer=useRef(null);

  // duel
  const [duelNames,setDuelNames]=useState(["Spieler 1","Spieler 2"]);
  const [p1Qs,setP1Qs]=useState([]);const [p2Qs,setP2Qs]=useState([]);
  const [p1Idx,setP1Idx]=useState(0);const [p2Idx,setP2Idx]=useState(0);
  const [p1Chosen,setP1Chosen]=useState(null);const [p2Chosen,setP2Chosen]=useState(null);
  const [p1Score,setP1Score]=useState(0);const [p2Score,setP2Score]=useState(0);
  const [p1Done,setP1Done]=useState(false);const [p2Done,setP2Done]=useState(false);
  const [duelTimeLeft,setDuelTimeLeft]=useState(60);
  const duelTimer=useRef(null);

  useEffect(()=>{
    if(screen==="quiz"&&mode==="time"&&soloChosen===null){
      soloTimer.current=setInterval(()=>{setTimeLeft(t=>{if(t<=1){clearInterval(soloTimer.current);setScreen("result");return 0;}return t-1;});},1000);
    }
    return()=>clearInterval(soloTimer.current);
  },[screen,mode,soloIdx,soloChosen]);

  useEffect(()=>{
    if(screen==="duel"&&mode==="time"){
      duelTimer.current=setInterval(()=>{setDuelTimeLeft(t=>{if(t<=1){clearInterval(duelTimer.current);setScreen("duel_result");return 0;}return t-1;});},1000);
    }
    return()=>clearInterval(duelTimer.current);
  },[screen,mode]);

  useEffect(()=>{
    if(screen!=="duel"||p1Chosen===null)return;
    const t=setTimeout(()=>{const next=p1Idx+1;if(next>=(mode==="count"?countSetting:p1Qs.length)){setP1Done(true);}else{setP1Idx(next);setP1Chosen(null);}},1200);
    return()=>clearTimeout(t);
  },[p1Chosen,screen]);

  useEffect(()=>{
    if(screen!=="duel"||p2Chosen===null)return;
    const t=setTimeout(()=>{const next=p2Idx+1;if(next>=(mode==="count"?countSetting:p2Qs.length)){setP2Done(true);}else{setP2Idx(next);setP2Chosen(null);}},1200);
    return()=>clearTimeout(t);
  },[p2Chosen,screen]);

  useEffect(()=>{
    if(screen==="duel"&&p1Done&&p2Done){clearInterval(duelTimer.current);const t=setTimeout(()=>setScreen("duel_result"),800);return()=>clearTimeout(t);}
  },[p1Done,p2Done,screen]);

  function startSolo(fromLearn=false){
    clearInterval(soloTimer.current);
    const pool=shuffle(ALL_QUESTIONS).slice(0,mode==="count"?countSetting:ALL_QUESTIONS.length);

      <div style={{color:"#fff",fontSize:22,fontWeight:900,textAlign:"center",marginBottom:5}}>{winner?`${winner} gewinnt!`:"Unentschieden!"}</div>
      <p style={{color:"#8fa8c8",textAlign:"center",marginBottom:20,fontSize:13}}>{winner?"Glückwunsch! 🎉":"Beide gleich stark!"}</p>
      <div style={{display:"flex",gap:12,marginBottom:20}}>
        {[[duelNames[0],p1Score,"#2196F3","🔵",p1Score>=p2Score],[duelNames[1],p2Score,"#F44336","🔴",p2Score>=p1Score]].map(([name,sc,col,em,isTop])=>(
          <div key={name} style={{flex:1,background:col+"15",border:`2px solid ${isTop?col:col+"44"}`,borderRadius:16,padding:"16px 10px",textAlign:"center"}}>
            <div style={{color:col,fontWeight:800,fontSize:13,marginBottom:6}}>{em} {name}</div>
            <div style={{color:isTop?"#f0c040":"#fff",fontSize:30,fontWeight:900}}>{sc}</div>
            <div style={{color:"#8fa8c8",fontSize:11,marginTop:2}}>Punkte</div>
            {isTop&&p1Score!==p2Score&&<div style={{fontSize:18,marginTop:4}}>👑</div>}
          </div>))}
      </div>
      <div style={{display:"flex",gap:10}}>
        <button onClick={startDuel} style={{background:"linear-gradient(135deg,#f0c040,#e8a020)",color:"#1a0f00",border:"none",borderRadius:14,padding:"13px 0",fontSize:14,fontWeight:800,cursor:"pointer",flex:1.5}}>🔄 Rematch</button>
        <button onClick={()=>setScreen("start")} style={{background:"rgba(255,255,255,0.08)",color:"#8fa8c8",border:"1px solid rgba(255,255,255,0.15)",borderRadius:14,padding:"13px 0",fontSize:13,fontWeight:600,cursor:"pointer",flex:1,fontFamily:"inherit"}}>🏠 Start</button>
      </div>
    </div></div>);
  }

  return <div style={WRAP}><div style={{color:"#fff"}}>Lädt…</div></div>;
}


    const root = ReactDOM.createRoot(document.getElementById('root'));
    root.render(<App />);
  </script>
</body>
</html>
